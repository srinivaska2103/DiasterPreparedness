<!DOCTYPE html>
<html lang="en" dir="ltr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/lifeguard.png">
    <title>SAFEGUARD | Establish Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { emergency: '#dc2626' }
                }
            }
        }
    </script>
    <style>
        body { overflow: hidden; touch-action: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-900 dark:text-white transition-colors duration-300 h-full w-full flex flex-col justify-center items-center">

    <div class="fixed top-4 right-4 z-50 flex items-center bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-full p-1 shadow-lg border border-slate-200 dark:border-gray-800">
        <button class="js-theme-toggle w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
            <i class="fas fa-moon text-xs"></i>
        </button>
        <div class="w-px h-4 bg-slate-200 dark:bg-gray-700 mx-1"></div>
        <button class="js-dir-toggle px-3 h-8 flex items-center justify-center rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
            LTR
        </button>
    </div>

    <main class="w-full max-w-[1024px] h-full md:h-auto md:max-h-[95vh] flex items-center justify-center p-0 md:p-6">
        <div class="w-full h-full md:h-auto bg-white dark:bg-gray-900 rounded-none md:rounded-[3rem] shadow-2xl overflow-hidden border-none md:border md:border-slate-100 md:dark:border-gray-800 grid grid-cols-1 lg:grid-cols-2">
            
            <div class="hidden lg:flex relative bg-slate-900 items-center justify-center p-12 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1536431311719-398b6704d4cc?q=80&w=800" class="absolute inset-0 w-full h-full object-cover opacity-30" alt="Survival Network">
                <div class="absolute inset-0 bg-gradient-to-t from-emergency/40 via-slate-900/40 to-transparent"></div>
                <div class="relative z-10 text-center">
                    <p class="text-slate-300 text-lg font-black uppercase tracking-[0.3em] leading-relaxed italic">
                        The world is changing. <br> Are you?
                    </p>
                    <div class="mt-6 w-12 h-1 bg-emergency mx-auto rounded-full"></div>
                </div>
            </div>

            <div class="p-6 md:p-10 lg:p-12 flex flex-col justify-center overflow-y-auto scroll-container">
                
                <div class="mb-4 text-center">
                    <a href="index.html" class="inline-block text-2xl md:text-3xl font-black text-emergency italic tracking-tighter hover:scale-105 transition-transform">
                        SAFEGUARD
                    </a>
                </div>

                <div class="mb-6 text-center">
                    <h2 class="text-xl md:text-2xl font-black uppercase italic tracking-tighter">Establish Protocol</h2>
                    <p class="text-slate-500 dark:text-gray-400 text-xs md:text-sm">Initialize your survival infrastructure.</p>
                </div>

                <div class="space-y-4">
                    <form id="signup-form" class="space-y-4">
                        <div class="grid grid-cols-1 gap-3">
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-2">First Name</label>
                                <input type="text" required placeholder="John" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emergency/20 focus:border-emergency outline-none transition-all dark:text-white text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-2">Last Name</label>
                                <input type="text" required placeholder="Doe" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emergency/20 focus:border-emergency outline-none transition-all dark:text-white text-sm">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-2">Comms Channel</label>
                            <input type="email" required placeholder="email@protocol.com" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emergency/20 focus:border-emergency outline-none transition-all dark:text-white text-sm">
                        </div>
                        
                        <div class="space-y-1">
    <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-2">Security Key</label>
    
    <div class="relative group">
        <input type="password" 
               id="protocol-key" 
               required 
               placeholder="Minimum 8 characters" 
               class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emergency/20 focus:border-emergency outline-none transition-all dark:text-white text-sm pr-12">
        
        <button type="button" 
                onclick="toggleKeyVisibility()" 
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emergency transition-colors duration-200">
            <i id="eye-icon" class="fas fa-eye text-xs"></i>
        </button>
    </div>
</div>

<script>
    function toggleKeyVisibility() {
        const input = document.getElementById('protocol-key');
        const icon = document.getElementById('eye-icon');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

                        <button type="submit" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-4 md:py-5 rounded-xl md:rounded-2xl font-black uppercase tracking-widest text-[10px] shadow-xl hover:opacity-90 active:scale-95 transition-all">
                            Initialize Network
                        </button>
                    </form>

                    <div class="pt-2">
                        <div class="relative mb-6 text-center">
                            <span class="relative z-10 bg-white dark:bg-gray-900 px-3 text-[9px] font-black uppercase tracking-[0.3em] text-slate-300">Third-Party Sync</span>
                            <div class="absolute top-1/2 left-0 w-full h-px bg-slate-100 dark:bg-gray-800"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-google text-red-500"></i></button>
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-apple text-slate-900 dark:text-white"></i></button>
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-facebook text-blue-600"></i></button>
                        </div>
                    </div>

                    <p class="text-center text-[11px] font-bold text-slate-400 mt-6">
                        Already have access? 
                        <a href="login.html" class="text-emergency uppercase tracking-widest text-[10px] ml-1 hover:underline">Log In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const themeBtns = document.querySelectorAll('.js-theme-toggle');
            const dirBtns = document.querySelectorAll('.js-dir-toggle');
            
            const setTheme = (isDark) => {
                if (isDark) {
                    html.classList.add('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-sun text-yellow-500 text-xs"></i>');
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.classList.remove('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-moon text-xs"></i>');
                    localStorage.setItem('theme', 'light');
                }
            };

            themeBtns.forEach(btn => btn.addEventListener('click', () => setTheme(!html.classList.contains('dark'))));

            const setDir = (dir) => {
                html.setAttribute('dir', dir);
                dirBtns.forEach(btn => btn.innerText = dir.toUpperCase());
                localStorage.setItem('dir', dir);
            };

            dirBtns.forEach(btn => btn.addEventListener('click', () => {
                const current = html.getAttribute('dir') || 'ltr';
                setDir(current === 'ltr' ? 'rtl' : 'ltr');
            }));

            if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) setTheme(true);
            if (localStorage.dir) setDir(localStorage.dir);
        });
    </script>
</body>
</html>
