<!DOCTYPE html>
<html lang="en" dir="ltr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/lifeguard.png">
    <title>SAFEGUARD | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { emergency: '#dc2626' }
                }
            }
        }
    </script>
    <style>
        /* Prevents bounce scroll on mobile browsers */
        body { overflow: hidden; touch-action: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-900 dark:text-white transition-colors duration-300 h-full w-full flex flex-col justify-center items-center">

    <div class="fixed top-4 right-4 z-50 flex items-center bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-full p-1 shadow-lg border border-slate-200 dark:border-gray-800">
        <button class="js-theme-toggle w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
            <i class="fas fa-moon text-xs"></i>
        </button>
        <div class="w-px h-4 bg-slate-200 dark:bg-gray-700 mx-1"></div>
        <button class="js-dir-toggle px-3 h-8 flex items-center justify-center rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
            LTR
        </button>
    </div>

    <main class="w-full max-w-[1024px] h-full md:h-auto md:max-h-[90vh] flex items-center justify-center p-0 md:p-6 lg:p-12">
        <div class="w-full h-full md:h-auto bg-white dark:bg-gray-900 rounded-none md:rounded-[3rem] shadow-2xl overflow-hidden border-none md:border md:border-slate-100 md:dark:border-gray-800 grid grid-cols-1 lg:grid-cols-2">
            
            <div class="hidden lg:flex relative bg-slate-900 items-center justify-center p-12 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1504333638930-c8787321eee0?q=80&w=800" class="absolute inset-0 w-full h-full object-cover opacity-30" alt="Survival">
                <div class="absolute inset-0 bg-gradient-to-t from-emergency/40 to-transparent"></div>
                <div class="relative z-10 text-center">
                    <p class="text-slate-300 text-lg font-medium max-w-sm mx-auto uppercase tracking-widest leading-relaxed">
                        Secure your infrastructure. <br> Protect your legacy.
                    </p>
                </div>
            </div>

            <div class="p-6 md:p-10 lg:p-12 flex flex-col justify-center overflow-y-auto scroll-container">
                
                <div class="mb-4 md:mb-6 text-center lg:text-left">
                    <a href="index.html" class="inline-block text-2xl md:text-3xl font-black text-emergency italic tracking-tighter hover:scale-105 transition-transform">
                        SAFEGUARD
                    </a>
                </div>

                <div class="mb-6 md:mb-8 text-center lg:text-left">
                    <h2 id="form-title" class="text-xl md:text-2xl font-black uppercase tracking-tighter italic">Welcome Back</h2>
                    <p id="form-subtitle" class="text-slate-500 dark:text-gray-400 text-xs md:text-sm">Access your bunker credentials.</p>
                </div>

                <div class="space-y-4">
                    <form id="login-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400 ml-4">Email Access</label>
                            <input type="email" placeholder="name@protocol.com" class="w-full px-5 py-3 md:py-4 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl md:rounded-2xl focus:ring-2 focus:ring-emergency/20 outline-none transition-all dark:text-white text-sm">
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between items-center px-4">
                                <label class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400">Security Key</label>
                                <a href="#" class="text-[9px] font-black uppercase tracking-widest text-emergency hover:underline">Forgot Password?</a>
                            </div>
                            <input type="password" placeholder="••••••••" class="w-full px-5 py-3 md:py-4 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl md:rounded-2xl focus:ring-2 focus:ring-emergency/20 outline-none transition-all dark:text-white text-sm">
                        </div>
                        <button type="submit" class="w-full bg-emergency text-white py-4 rounded-xl md:rounded-2xl font-black uppercase tracking-widest text-[10px] shadow-lg shadow-red-500/20 hover:bg-red-700 active:scale-95 transition-all">Authorize Entry</button>
                    </form>

                    <form id="signup-form" class="hidden space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" placeholder="First" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl outline-none text-sm dark:text-white">
                            <input type="text" placeholder="Last" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl outline-none text-sm dark:text-white">
                        </div>
                        <input type="email" placeholder="Email Address" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl outline-none text-sm dark:text-white">
                        <input type="password" placeholder="Security Key" class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl outline-none text-sm dark:text-white">
                        <button type="submit" class="w-full bg-slate-900 dark:bg-white dark:text-gray-900 text-white py-4 rounded-xl font-black uppercase tracking-widest text-[10px] shadow-lg">Establish Protocol</button>
                    </form>

                    <div class="pt-2">
                        <div class="relative mb-4 text-center">
                            <span class="relative z-10 bg-white dark:bg-gray-900 px-3 text-[9px] font-black uppercase tracking-[0.3em] text-slate-300">Third-Party Auth</span>
                            <div class="absolute top-1/2 left-0 w-full h-px bg-slate-100 dark:bg-gray-800"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-google text-red-500"></i></button>
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-apple text-slate-900 dark:text-white"></i></button>
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-facebook text-blue-600"></i></button>
                        </div>
                    </div>

                    <p class="text-center text-[11px] font-bold text-slate-400 mt-4">
                        <span id="switch-text">New to the protocol?</span> 
                        <button id="switch-form" class="text-emergency uppercase tracking-widest text-[10px] ml-1 hover:underline">Sign Up</button>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const themeBtns = document.querySelectorAll('.js-theme-toggle');
            const dirBtns = document.querySelectorAll('.js-dir-toggle');
            
            const setTheme = (isDark) => {
                if (isDark) {
                    html.classList.add('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-sun text-yellow-500 text-xs"></i>');
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.classList.remove('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-moon text-xs"></i>');
                    localStorage.setItem('theme', 'light');
                }
            };

            themeBtns.forEach(btn => btn.addEventListener('click', () => setTheme(!html.classList.contains('dark'))));

            const setDir = (dir) => {
                html.setAttribute('dir', dir);
                dirBtns.forEach(btn => btn.innerText = dir.toUpperCase());
                localStorage.setItem('dir', dir);
            };

            dirBtns.forEach(btn => btn.addEventListener('click', () => {
                const current = html.getAttribute('dir') || 'ltr';
                setDir(current === 'ltr' ? 'rtl' : 'ltr');
            }));

            if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) setTheme(true);
            if (localStorage.dir) setDir(localStorage.dir);

            const switchBtn = document.getElementById('switch-form');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const switchText = document.getElementById('switch-text');

            switchBtn.addEventListener('click', () => {
                const isLoggingIn = !loginForm.classList.contains('hidden');
                if (isLoggingIn) {
                    loginForm.classList.add('hidden');
                    signupForm.classList.remove('hidden');
                    title.innerText = "Establish Comms";
                    subtitle.innerText = "Join the network.";
                    switchText.innerText = "Registered?";
                    switchBtn.innerText = "Log In";
                } else {
                    loginForm.classList.remove('hidden');
                    signupForm.classList.add('hidden');
                    title.innerText = "Welcome Back";
                    subtitle.innerText = "Access bunker credentials.";
                    switchText.innerText = "New here?";
                    switchBtn.innerText = "Sign Up";
                }
            });
        });
    </script>
</body>
</html>
