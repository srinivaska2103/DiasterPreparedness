<!DOCTYPE html>
<html lang="en" dir="ltr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/lifeguard.png">
    <title>SAFEGUARD | Access Authorization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { emergency: '#dc2626' }
                }
            }
        }
    </script>
    <style>
        body { overflow: hidden; touch-action: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-900 dark:text-white transition-colors duration-300 h-full w-full flex flex-col justify-center items-center">

    <div class="fixed top-4 right-4 z-50 flex items-center bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-full p-1 shadow-lg border border-slate-200 dark:border-gray-800">
        <button class="js-theme-toggle w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
            <i class="fas fa-moon text-xs"></i>
        </button>
        <div class="w-px h-4 bg-slate-200 dark:bg-gray-700 mx-1"></div>
        <button class="js-dir-toggle px-3 h-8 flex items-center justify-center rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
            LTR
        </button>
    </div>

    <main class="w-full max-w-[1024px] h-full md:h-auto md:max-h-[90vh] flex items-center justify-center p-0 md:p-6 lg:p-12">
        <div class="w-full h-full md:h-auto bg-white dark:bg-gray-900 rounded-none md:rounded-[3rem] shadow-2xl overflow-hidden border-none md:border md:border-slate-100 md:dark:border-gray-800 grid grid-cols-1 lg:grid-cols-2">
            
            <div class="hidden lg:flex relative bg-slate-900 items-center justify-center p-12 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1504333638930-c8787321eee0?q=80&w=800" class="absolute inset-0 w-full h-full object-cover opacity-30" alt="Survival">
                <div class="absolute inset-0 bg-gradient-to-t from-emergency/40 to-transparent"></div>
                <div class="relative z-10 text-center">
                    <p class="text-slate-300 text-lg font-medium max-w-sm mx-auto uppercase tracking-widest leading-relaxed">
                        Secure your infrastructure. <br> Protect your legacy.
                    </p>
                </div>
            </div>

            <div class="p-6 md:p-10 lg:p-12 flex flex-col justify-center overflow-y-auto scroll-container">
                
                <div class="mb-4 md:mb-6 text-center">
                    <a href="index.html" class="inline-block text-2xl md:text-3xl font-black text-emergency italic tracking-tighter hover:scale-105 transition-transform">
                        SAFEGUARD
                    </a>
                </div>

                <div class="mb-8 text-center">
                    <h2 class="text-xl md:text-2xl font-black uppercase italic tracking-tighter">Welcome Back</h2>
                    <p class="text-slate-500 dark:text-gray-400 text-xs md:text-sm">Access your bunker credentials.</p>
                </div>

                <div class="space-y-6">
                    <form id="login-form" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400 ml-4">Email Access</label>
                            <input type="email" required placeholder="name@protocol.com" class="w-full px-5 py-3 md:py-4 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl md:rounded-2xl focus:ring-2 focus:ring-emergency/20 focus:border-emergency outline-none transition-all dark:text-white text-sm">
                        </div>
                        
                      <div class="space-y-3">
    <div class="flex justify-between items-center px-4">
        <label class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400">Security Key</label>
    </div>

    <div class="relative group">
        <input type="password" id="security-key" required placeholder="••••••••" 
               class="w-full px-5 py-3 md:py-4 bg-slate-50 dark:bg-gray-800 border border-slate-100 dark:border-gray-700 rounded-xl md:rounded-2xl focus:ring-2 focus:ring-emergency/20 focus:border-emergency outline-none transition-all dark:text-white text-sm">
        
        <button type="button" onclick="togglePassword()" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emergency transition-colors">
            <i id="eye-icon" class="fas fa-eye text-xs"></i>
        </button>
    </div>

    <div class="flex justify-between items-center px-2">
        <label class="flex items-center cursor-pointer group">
            <div class="relative">
                <input type="checkbox" class="sr-only peer">
                <div class="w-4 h-4 border border-slate-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 peer-checked:bg-emergency peer-checked:border-emergency transition-all"></div>
                <i class="fas fa-check absolute inset-0 text-[8px] text-white scale-0 peer-checked:scale-100 transition-transform flex items-center justify-center"></i>
            </div>
            <span class="ml-2 text-[9px] font-black uppercase tracking-widest text-slate-400 group-hover:text-slate-600 dark:group-hover:text-gray-300 transition-colors">Remember Protocol</span>
        </label>

        <a href="#" class="text-[9px] font-black uppercase tracking-widest text-emergency hover:underline">
            Forgot Password?
        </a>
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('security-key');
        const icon = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

                        <button type="submit" class="w-full bg-emergency text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-black uppercase tracking-widest text-[10px] shadow-lg shadow-red-500/20 hover:bg-red-700 active:scale-95 transition-all">
                            Authorize Entry
                        </button>
                    </form>

                    <div class="pt-2">
                        <div class="relative mb-6 text-center">
                            <span class="relative z-10 bg-white dark:bg-gray-900 px-3 text-[9px] font-black uppercase tracking-[0.3em] text-slate-300">Alternate Link</span>
                            <div class="absolute top-1/2 left-0 w-full h-px bg-slate-100 dark:bg-gray-800"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-google text-red-500"></i></button>
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-apple text-slate-900 dark:text-white"></i></button>
                            <button class="flex items-center justify-center py-3 border border-slate-100 dark:border-gray-800 rounded-xl hover:bg-slate-50 dark:hover:bg-gray-800 transition-all text-base"><i class="fab fa-facebook text-blue-600"></i></button>
                        </div>
                    </div>
                    <a href="regesiter.html">
                         <p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mt-6">
                       Don't Have Account?<span class="text-green-500">Sign up</span>
                    </p>
                    </a>
                   
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const themeBtns = document.querySelectorAll('.js-theme-toggle');
            const dirBtns = document.querySelectorAll('.js-dir-toggle');
            
            const setTheme = (isDark) => {
                if (isDark) {
                    html.classList.add('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-sun text-yellow-500 text-xs"></i>');
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.classList.remove('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-moon text-xs"></i>');
                    localStorage.setItem('theme', 'light');
                }
            };

            themeBtns.forEach(btn => btn.addEventListener('click', () => setTheme(!html.classList.contains('dark'))));

            const setDir = (dir) => {
                html.setAttribute('dir', dir);
                dirBtns.forEach(btn => btn.innerText = dir.toUpperCase());
                localStorage.setItem('dir', dir);
            };

            dirBtns.forEach(btn => btn.addEventListener('click', () => {
                const current = html.getAttribute('dir') || 'ltr';
                setDir(current === 'ltr' ? 'rtl' : 'ltr');
            }));

            if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) setTheme(true);
            if (localStorage.dir) setDir(localStorage.dir);
        });
    </script>
</body>
</html>
