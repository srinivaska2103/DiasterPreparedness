<!DOCTYPE html>
<html lang="en" dir="ltr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/lifeguard.png">
    <title>SAFEGUARD | 404 Signal Lost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { emergency: '#dc2626' }
                }
            }
        }
    </script>
    <style>
        body { overflow: hidden; }
        .glitch { animation: glitch 1.5s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-900 dark:text-white transition-colors duration-300 h-full w-full flex flex-col justify-center items-center">

    <header class="fixed top-0 left-0 w-full p-6 md:p-8 flex justify-between items-center z-50">
        <a href="index.html" class="text-2xl md:text-3xl font-black text-emergency italic tracking-tighter hover:scale-105 transition-transform">
            SAFEGUARD
        </a>

        <div class="flex items-center bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-full p-1 shadow-lg border border-slate-200 dark:border-gray-800">
            <button class="js-theme-toggle w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
                <i class="fas fa-moon text-xs"></i>
            </button>
            <div class="w-px h-4 bg-slate-200 dark:bg-gray-700 mx-1"></div>
            <button class="js-dir-toggle px-3 h-8 md:h-10 flex items-center justify-center rounded-full text-[9px] md:text-[11px] font-black uppercase tracking-widest hover:bg-slate-100 dark:hover:bg-gray-800 transition-all">
                LTR
            </button>
        </div>
    </header>

    <main class="w-full max-w-[1024px] px-6 text-center">
        <div class="relative inline-block mb-8">
            <div class="absolute inset-0 bg-emergency/20 rounded-full blur-3xl animate-pulse"></div>
            <div class="relative w-32 h-32 md:w-48 md:h-48 rounded-full border-4 border-dashed border-slate-200 dark:border-gray-800 flex items-center justify-center">
                <i class="fas fa-satellite-dish text-4xl md:text-6xl text-emergency animate-bounce"></i>
            </div>
        </div>

        <h1 class="text-7xl md:text-9xl font-black text-slate-900 dark:text-white tracking-tighter mb-4 glitch uppercase leading-none">404</h1>
        <h2 class="text-xl md:text-3xl font-bold uppercase tracking-widest mb-6 italic">Signal Lost in Sector</h2>
        
        <p class="text-slate-500 dark:text-gray-400 text-sm md:text-lg max-w-lg mx-auto mb-10 leading-relaxed font-medium">
            The protocol you requested is unreachable. Return to the main bunker to re-establish communications.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="index.html" class="w-full sm:w-auto bg-emergency text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-red-500/20 hover:bg-red-700 active:scale-95 transition-all">
                Return to Home
            </a>
            <a href="contact.html" class="w-full sm:w-auto bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:opacity-90 transition-all">
                Report Incident
            </a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const themeBtns = document.querySelectorAll('.js-theme-toggle');
            const dirBtns = document.querySelectorAll('.js-dir-toggle');
            
            // --- THEME LOGIC ---
            const setTheme = (isDark) => {
                if (isDark) {
                    html.classList.add('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-sun text-yellow-500 text-xs"></i>');
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.classList.remove('dark');
                    themeBtns.forEach(btn => btn.innerHTML = '<i class="fas fa-moon text-xs"></i>');
                    localStorage.setItem('theme', 'light');
                }
            };

            themeBtns.forEach(btn => btn.addEventListener('click', () => setTheme(!html.classList.contains('dark'))));

            // --- DIRECTION LOGIC ---
            const setDir = (dir) => {
                html.setAttribute('dir', dir);
                dirBtns.forEach(btn => btn.innerText = dir.toUpperCase());
                localStorage.setItem('dir', dir);
            };

            dirBtns.forEach(btn => btn.addEventListener('click', () => {
                const current = html.getAttribute('dir') || 'ltr';
                setDir(current === 'ltr' ? 'rtl' : 'ltr');
            }));

            // Initialize from Storage
            if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) setTheme(true);
            if (localStorage.dir) setDir(localStorage.dir);
        });
    </script>
</body>
</html>
